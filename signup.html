<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether — Rejoindre</title>
  <link rel="stylesheet" href="/css/aether.css">
</head>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
  }
  </script>
<body>
<div class="auth-wrap">
  <div class="auth-box">

    <div class="auth-logo">✦ AETHER</div>
    <div class="auth-tagline">LE RÉSEAU DES ÂMES</div>

    <div class="auth-title">Crée ton Temple</div>

    <div class="field">
      <label>Adresse email</label>
      <input type="email" id="email" placeholder="ton@ame.com" />
    </div>

    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="Min. 8 caractères" />
    </div>

    <div class="field">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirm" placeholder="Répète le mot de passe" />
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="handleSignup()">
      REJOINDRE L'AETHER
    </button>

    <div id="msgBox" class="hidden"></div>

    <p class="auth-link">Déjà une âme ? <a href="/login">Se connecter</a></p>

  </div>
</div>

<script type="module">
  import { supabase } from '/lib/supabase.js'

  window.handleSignup = async function() {
    const email    = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const confirm  = document.getElementById('confirm').value
    const btn      = document.getElementById('submitBtn')
    const msgBox   = document.getElementById('msgBox')

    msgBox.className = 'hidden'

    if (!email || !password) {
      return showMsg('Remplis tous les champs.', 'error')
    }
    if (password.length < 8) {
      return showMsg('Mot de passe trop court (min. 8 caractères).', 'error')
    }
    if (password !== confirm) {
      return showMsg('Les mots de passe ne correspondent pas.', 'error')
    }

    btn.disabled = true
    btn.innerHTML = '<span class="loader"></span>'

    const { error } = await supabase.auth.signUp({ email, password })

    if (error) {
      btn.disabled = false
      btn.textContent = 'REJOINDRE L\'AETHER'
      return showMsg(error.message, 'error')
    }

    showMsg('✓ Vérifie ta boîte mail pour confirmer ton compte.', 'success')
    btn.textContent = 'EMAIL ENVOYÉ ✓'
  }

  function showMsg(text, type) {
    const box = document.getElementById('msgBox')
    box.className = type === 'error' ? 'msg-error' : 'msg-success'
    box.textContent = text
  }
</script>
</body>
</html>
