<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether — Flux Divin</title>
  <link rel="stylesheet" href="/css/aether.css">
  <link rel="stylesheet" href="/css/flux.css">
</head>
<body>

<nav class="navbar">
  <a href="/flux" class="nav-logo">✦ AETHER</a>
  <div class="nav-links">
    <a href="/flux"          class="nav-item active">🌊 Flux</a>
    <a href="/conciles"      class="nav-item">🔮 Conciles</a>
    <a href="/recherche"     class="nav-item">🔍</a>
    <a href="/notifications" class="nav-item" id="navNotifs">
      🔔 <span class="nav-badge hidden" id="navBadge">0</span>
    </a>
    <a href="/temple" class="nav-item" id="navTemple">🏛️ Temple</a>
  </div>
  <button class="nav-btn-logout" onclick="handleLogout()">Quitter</button>
</nav>

<div class="page-layout">
  <main class="feed-col">

    <div class="composer" id="composer">
      <div class="composer-avatar" id="composerAvatar">?</div>
      <div class="composer-body">
        <textarea id="souffleText" class="composer-input"
          placeholder="Quel Souffle portes-tu aujourd'hui ?"
          maxlength="280" oninput="updateCounter()"></textarea>

        <div class="type-row">
          <button class="type-pill active" data-type="simple"     onclick="selectType(this)">💬 Simple</button>
          <button class="type-pill"        data-type="oracle"     onclick="selectType(this)">🔮 Oracle</button>
          <button class="type-pill"        data-type="revelation" onclick="selectType(this)">📜 Révélation</button>
        </div>

        <div class="emotion-row" id="emotionRow">
          <button class="emo-pill"        data-emo="feu"    onclick="selectEmo(this)">🔥 Feu</button>
          <button class="emo-pill"        data-emo="eau"    onclick="selectEmo(this)">💧 Eau</button>
          <button class="emo-pill active" data-emo="terre"  onclick="selectEmo(this)">🌿 Terre</button>
          <button class="emo-pill"        data-emo="eclair" onclick="selectEmo(this)">⚡ Éclair</button>
          <button class="emo-pill"        data-emo="brume"  onclick="selectEmo(this)">🌫️ Brume</button>
        </div>

        <div class="composer-footer">
          <span class="char-count" id="charCount">0 / 280</span>
          <button class="btn-souffle" id="btnSouffle" onclick="publier()">✦ SOUFFLER</button>
        </div>
        <div id="composeMsg" class="hidden"></div>
      </div>
    </div>

    <div id="feedList">
      <div class="feed-loading">Chargement du Flux Divin...</div>
    </div>

    <button class="btn-load-more hidden" id="btnMore" onclick="chargerPlus()">
      Charger plus
    </button>
  </main>

  <aside class="sidebar-col">
    <div class="sidebar-card">
      <div class="sc-title">✦ MON KARMA</div>
      <div class="karma-num" id="karmaNum">—</div>
      <div class="karma-label" id="karmaLabel">Chargement...</div>
    </div>
    <div class="sidebar-card">
      <div class="sc-title">📖 LES ÉMOTIONS</div>
      <div class="emo-legend">
        <div class="emo-leg-item"><span>🔥</span> Passion · Indignation</div>
        <div class="emo-leg-item"><span>💧</span> Douceur · Empathie</div>
        <div class="emo-leg-item"><span>🌿</span> Sagesse · Ancrage</div>
        <div class="emo-leg-item"><span>⚡</span> Humour · Surprise</div>
        <div class="emo-leg-item"><span>🌫️</span> Mystère · Doute</div>
      </div>
    </div>
  </aside>
</div>

<!-- MODAL SIGNALEMENT -->
<div class="modal-overlay hidden" id="reportModal">
  <div class="modal-box" style="max-width:400px">
    <div class="modal-title">
      <span>🚩 SIGNALER</span>
      <button class="modal-close" onclick="closeReport()">×</button>
    </div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6">
      Pourquoi signales-tu ce contenu ?
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      <label class="report-option"><input type="radio" name="reason" value="spam"> Spam</label>
      <label class="report-option"><input type="radio" name="reason" value="haine"> Discours haineux</label>
      <label class="report-option"><input type="radio" name="reason" value="harassment"> Harcèlement</label>
      <label class="report-option"><input type="radio" name="reason" value="fake"> Fausse information</label>
      <label class="report-option"><input type="radio" name="reason" value="autre"> Autre</label>
    </div>
    <div class="field">
      <label>Détail (optionnel)</label>
      <textarea id="reportDetail" placeholder="Explique brièvement..." maxlength="300"></textarea>
    </div>
    <button class="btn btn-primary" id="reportBtn" onclick="submitReport()">
      ENVOYER LE SIGNALEMENT
    </button>
    <div id="reportMsg" class="hidden" style="margin-top:12px"></div>
  </div>
</div>

<script type="module">
  import { requireAuth, logout, getOrCreateEntity } from '/lib/auth.js'
  import { getFeed, publierSouffle, resonner, echoSouffle } from '/lib/souffles.js'
  import { EMOTIONS, TYPES, timeAgo, avatarInitials }       from '/lib/utils.js'
  import { countUnread }  from '/lib/notifications.js'
  import { supabase }     from '/lib/supabase.js'

  let currentUser   = null
  let currentEntity = null
  let selectedEmo   = 'terre'
  let selectedType  = 'simple'
  let page          = 0
  let loading       = false
  let reportTarget  = null

  // ── INIT ──
  try {
    currentUser = await requireAuth()
    if (!currentUser) return

    console.log('[flux] user:', currentUser.id, currentUser.email)

    currentEntity = await getOrCreateEntity(currentUser.id, currentUser.email)

    if (!currentEntity) {
      showToast('Profil introuvable. Reconnecte-toi.', 'error')
      setTimeout(() => window.location.href = '/login', 2000)
      return
    }

    console.log('[flux] entity:', currentEntity.username)

    document.getElementById('composerAvatar').textContent =
      avatarInitials(currentEntity.display_name || '')
    document.getElementById('karmaNum').textContent =
      (currentEntity.karma_score || 0).toLocaleString('fr-FR')
    document.getElementById('karmaLabel').textContent =
      niveauLabel(currentEntity.karma_score || 0)

    const navTemple = document.getElementById('navTemple')
    if (navTemple && currentEntity.username)
      navTemple.href = `/temple?u=${currentEntity.username}`

    try {
      const unread = await countUnread(currentUser.id)
      const badge  = document.getElementById('navBadge')
      if (unread > 0) { badge.textContent = unread; badge.classList.remove('hidden') }
    } catch(e) { console.warn('[flux] badge error:', e) }

    supabase.channel('badge-flux')
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public',
        table: 'notifications',
        filter: `to_entity_id=eq.${currentUser.id}`
      }, async () => {
        try {
          const c     = await countUnread(currentUser.id)
          const badge = document.getElementById('navBadge')
          badge.textContent = c
          badge.classList.toggle('hidden', c === 0)
        } catch(e) {}
      })
      .subscribe()

    await chargerFeed()

  } catch(err) {
    console.error('[flux] init error:', err)
    showToast('Erreur de chargement. Actualise.', 'error')
  }

  // ── COMPOSER ──
  window.selectType = function(el) {
    document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'))
    el.classList.add('active')
    selectedType = el.dataset.type
  }

  window.selectEmo = function(el) {
    document.querySelectorAll('.emo-pill').forEach(p => p.classList.remove('active'))
    el.classList.add('active')
    selectedEmo = el.dataset.emo
    const e = EMOTIONS[selectedEmo]
    if (e) document.getElementById('emotionRow').style.borderColor = e.border
  }

  window.updateCounter = function() {
    const len = document.getElementById('souffleText').value.length
    const el  = document.getElementById('charCount')
    el.textContent = `${len} / 280`
    el.style.color = len > 250 ? '#c62828' : ''
  }

  window.publier = async function() {
    const content = document.getElementById('souffleText').value.trim()
    const btn     = document.getElementById('btnSouffle')
    const msgBox  = document.getElementById('composeMsg')

    if (!content) return
    if (!currentUser) { showToast('Non connecté.', 'error'); return }

    btn.disabled    = true
    btn.innerHTML   = '<span class="loader"></span>'
    msgBox.className = 'hidden'

    console.log('[flux] publication...', { userId: currentUser.id, content, emotion: selectedEmo, type: selectedType })

    const { data, error } = await publierSouffle({
      userId:  currentUser.id,
      content,
      emotion: selectedEmo,
      type:    selectedType,
    })

    btn.disabled    = false
    btn.textContent = '✦ SOUFFLER'

    if (error) {
      const msg = typeof error === 'string' ? error : (error.message || 'Erreur.')
      msgBox.className  = 'msg-error'
      msgBox.textContent = msg
      console.error('[flux] publish error:', error)
      return
    }

    console.log('[flux] publié:', data?.id)
    document.getElementById('souffleText').value = ''
    document.getElementById('charCount').textContent = '0 / 280'
    msgBox.className = 'hidden'

    if (data) {
      const feedList = document.getElementById('feedList')
      if (feedList.querySelector('.feed-loading, .feed-empty'))
        feedList.innerHTML = ''
      feedList.insertAdjacentHTML('afterbegin',
        buildCard({ ...data, entities: currentEntity, resonances: [], echos: [] }))
    }

    currentEntity.karma_score = (currentEntity.karma_score || 0) + 10
    document.getElementById('karmaNum').textContent =
      currentEntity.karma_score.toLocaleString('fr-FR')
    showToast('Souffle publié ✦', 'success')
  }

  // ── FEED ──
  async function chargerFeed() {
    if (loading) return
    loading = true
    const feedList = document.getElementById('feedList')
    if (page === 0) feedList.innerHTML = '<div class="feed-loading">Chargement...</div>'

    try {
      const { data, error } = await getFeed(page)

      if (error) {
        console.error('[flux] getFeed error:', error)
        if (page === 0) feedList.innerHTML = `
          <div class="feed-empty">Erreur de chargement.<br>
          <button onclick="location.reload()"
            style="margin-top:12px;padding:8px 20px;border-radius:20px;
              border:1px solid var(--border);background:var(--surface);cursor:pointer">
            Réessayer
          </button></div>`
        loading = false
        return
      }

      if (!data?.length) {
        if (page === 0)
          feedList.innerHTML = '<div class="feed-empty">Le Flux est silencieux.<br>Sois le premier à Souffler ✦</div>'
        document.getElementById('btnMore').classList.add('hidden')
        loading = false
        return
      }

      if (page === 0) feedList.innerHTML = ''
      data.forEach(s => feedList.insertAdjacentHTML('beforeend', buildCard(s)))
      document.getElementById('btnMore').classList.toggle('hidden', data.length < 15)

    } catch(err) {
      console.error('[flux] chargerFeed exception:', err)
      if (page === 0) feedList.innerHTML = '<div class="feed-empty">Erreur inattendue.</div>'
    }

    loading = false
  }

  window.chargerPlus = async function() { page++; await chargerFeed() }

  // ── CARD ──
  function buildCard(s) {
    const e         = EMOTIONS[s.emotion] || EMOTIONS.terre
    const t         = TYPES[s.type]       || TYPES.simple
    const entity    = s.entities          || {}
    const resCount  = s.resonances?.length  || 0
    const echoCount = s.echos?.length       || 0
    const isMine    = s.entity_id === currentUser?.id
    const hasRes    = s.resonances?.some(r => r.entity_id === currentUser?.id)
    const hasEcho   = s.echos?.some(ec => ec.entity_id === currentUser?.id)

    return `
    <article class="souffle-card ${s.is_ascending ? 'ascending' : ''}"
      style="border-left:3px solid ${e.border}">
      ${s.is_ascending ? '<div class="ascending-banner">✦ Souffle Ascendant</div>' : ''}
      ${s.type !== 'simple' ? `<div class="type-label">${t.icon} ${t.label}</div>` : ''}
      <div class="card-top">
        <div class="card-avatar"
          style="background:${e.bg};color:${e.color};border:1.5px solid ${e.border}">
          ${avatarInitials(entity.display_name || '?')}
        </div>
        <div class="card-meta">
          <span class="card-name" style="cursor:pointer"
            onclick="window.location.href='/temple?u=${entity.username || ''}'">
            ${esc(entity.display_name || 'Anonyme')}
          </span>
          <span class="card-handle">@${entity.username || '—'}</span>
          <span class="wisdom-pill">Sagesse ${entity.wisdom_level || 1}</span>
        </div>
        <div class="card-time">${timeAgo(s.created_at)}</div>
      </div>
      <div class="emotion-tag"
        style="background:${e.bg};color:${e.color};border:1px solid ${e.border}">
        ${e.icon} Souffle de ${e.label}
      </div>
      <p class="card-content">${esc(s.content)}</p>
      <div class="card-actions">
        <button class="action-btn ${hasRes ? 'active' : ''}"
          onclick="handleResonner('${s.id}', this)">
          ✨ <span class="res-count">${resCount}</span>
        </button>
        <button class="action-btn ${hasEcho ? 'active' : ''}"
          onclick="handleEcho('${s.id}', this)">
          🌊 <span>${echoCount}</span>
        </button>
        ${isMine
          ? `<button class="action-btn danger" onclick="voilerSouffle('${s.id}',this)">👁️ Voiler</button>`
          : `<button class="action-btn" onclick="openReport('souffle','${s.id}')">🚩</button>`}
      </div>
    </article>`
  }

  // ── ACTIONS ──
  window.handleResonner = async function(souffleId, btn) {
    if (!currentUser) return
    const { action } = await resonner(currentUser.id, souffleId, selectedEmo)
    if (action === 'error') return
    const countEl = btn.querySelector('.res-count')
    const count   = parseInt(countEl.textContent) || 0
    if (action === 'added') { countEl.textContent = count + 1; btn.classList.add('active') }
    else { countEl.textContent = Math.max(0, count - 1); btn.classList.remove('active') }
  }

  window.handleEcho = async function(souffleId, btn) {
    if (!currentUser) return
    const { action } = await echoSouffle(currentUser.id, souffleId)
    if (action === 'error') return
    const countEl = btn.querySelector('span')
    const count   = parseInt(countEl.textContent) || 0
    if (action === 'added') { countEl.textContent = count + 1; btn.classList.add('active') }
    else { countEl.textContent = Math.max(0, count - 1); btn.classList.remove('active') }
  }

  window.voilerSouffle = async function(souffleId, btn) {
    if (!confirm('Voiler ce Souffle ?')) return
    const { error } = await supabase
      .from('souffles').update({ is_veiled: true }).eq('id', souffleId)
    if (error) { showToast('Erreur.', 'error'); return }
    btn.closest('.souffle-card').remove()
  }

  // ── SIGNALEMENT ──
  window.openReport = function(type, id) {
    reportTarget = { type, id }
    document.querySelectorAll('input[name="reason"]').forEach(r => r.checked = false)
    document.getElementById('reportDetail').value = ''
    document.getElementById('reportMsg').className = 'hidden'
    document.getElementById('reportModal').classList.remove('hidden')
  }

  window.closeReport = function() {
    document.getElementById('reportModal').classList.add('hidden')
    reportTarget = null
  }

  window.submitReport = async function() {
    const reason = document.querySelector('input[name="reason"]:checked')?.value
    const detail = document.getElementById('reportDetail').value.trim()
    const btn    = document.getElementById('reportBtn')
    const msg    = document.getElementById('reportMsg')
    if (!reason) { msg.className = 'msg-error'; msg.textContent = 'Choisis une raison.'; return }
    btn.disabled = true; btn.innerHTML = '<span class="loader"></span>'
    const { error } = await supabase.from('reports').insert({
      reporter_id: currentUser.id,
      target_type: reportTarget.type,
      target_id:   reportTarget.id,
      reason, detail: detail || null
    })
    btn.disabled = false; btn.textContent = 'ENVOYER LE SIGNALEMENT'
    if (error?.code === '23505') { msg.className = 'msg-error'; msg.textContent = 'Déjà signalé.'; return }
    if (error) { msg.className = 'msg-error'; msg.textContent = error.message; return }
    msg.className = 'msg-success'; msg.textContent = '✓ Signalement envoyé.'
    setTimeout(closeReport, 1500)
  }

  window.handleLogout = logout

  // ── HELPERS ──
  function niveauLabel(k) {
    if (k >= 10000) return '✦ Divin'
    if (k >= 5000)  return '⚡ Sage'
    if (k >= 2000)  return '🔮 Gardien'
    if (k >= 500)   return '🌿 Initié'
    return '🌫️ Novice'
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  function showToast(message, type = 'info') {
    const existing = document.getElementById('aether-toast')
    if (existing) existing.remove()
    const toast = document.createElement('div')
    toast.id = 'aether-toast'
    Object.assign(toast.style, {
      position: 'fixed', bottom: '24px', left: '50%',
      transform: 'translateX(-50%)',
      background: type === 'error' ? '#c62828' : (type === 'success' ? '#2e7d32' : '#1a1814'),
      color: 'white', padding: '12px 24px', borderRadius: '24px',
      fontSize: '13px', fontWeight: '600', zIndex: '9999',
      boxShadow: '0 4px 20px rgba(0,0,0,0.2)',
      fontFamily: 'Sora,sans-serif', whiteSpace: 'nowrap',
    })
    toast.textContent = message
    document.body.appendChild(toast)
    setTimeout(() => toast.remove(), 3000)
  }
</script>
</body>
</html>
