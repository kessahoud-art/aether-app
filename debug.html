<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:monospace;background:#09090f;color:#ddd;padding:16px;font-size:13px}
    h2{color:#c9a84c;letter-spacing:3px;font-size:13px;margin-bottom:16px}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    input,select{background:#111;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#ddd;font-family:monospace;font-size:12px;flex:1;min-width:180px;outline:none}
    input:focus,select:focus{border-color:#c9a84c}
    button{padding:8px 16px;border-radius:6px;font-size:11px;font-family:monospace;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all 0.15s;white-space:nowrap}
    .b{background:rgba(33,150,243,.2);color:#64b5f6;border-color:rgba(33,150,243,.4)}
    .g{background:rgba(76,175,80,.2);color:#81c784;border-color:rgba(76,175,80,.4)}
    .y{background:rgba(255,214,0,.2);color:#ffd600;border-color:rgba(255,214,0,.4)}
    .r{background:rgba(244,67,54,.2);color:#ef9a9a;border-color:rgba(244,67,54,.4)}
    .gold{background:rgba(201,168,76,.2);color:#c9a84c;border-color:rgba(201,168,76,.4)}
    .sep{height:1px;background:#1a1a25;margin:12px 0}
    .section{background:#111118;border:1px solid #1e1e2e;border-radius:10px;padding:14px;margin-bottom:10px}
    #log{background:#000;border:1px solid #1e1e2e;border-radius:10px;padding:10px;height:340px;overflow-y:auto;margin-top:10px;font-size:12px;line-height:1.7}
    .li{padding:2px 4px;border-radius:3px;margin-bottom:1px;word-break:break-all}
    .li.ok{color:#81c784} .li.ok::before{content:'✅ '}
    .li.er{color:#ef9a9a;background:rgba(244,67,54,.05)} .li.er::before{content:'❌ '}
    .li.wa{color:#ffd600} .li.wa::before{content:'⚠️ '}
    .li.in{color:#888}    .li.in::before{content:'ℹ️ '}
    .li.da{color:#ce93d8} .li.da::before{content:'📦 '}
    .li.ts{color:#c9a84c;font-weight:700} .li.ts::before{content:'🔍 '}
    .log-actions{display:flex;gap:8px;margin-bottom:8px}
  </style>
</head>
<body>

<h2>✦ AETHER DEBUG CONSOLE</h2>

<!-- CONFIG -->
<div class="section">
  <div class="row">
    <input id="cfgUrl"  placeholder="https://xxxxx.supabase.co" type="url"/>
    <input id="cfgAnon" placeholder="eyJ... (clé anon)" type="text"/>
    <button class="gold" onclick="connectSupabase()">🔌 CONNECTER</button>
  </div>
  <div id="connectStatus" style="font-size:11px;color:#555;margin-top:4px">
    Non connecté — entre ton URL + clé ANON Supabase
  </div>
</div>

<!-- AUTH -->
<div class="section">
  <h2>🔐 AUTH</h2>
  <div class="row">
    <input id="email"    placeholder="email@test.com" type="email"/>
    <input id="password" placeholder="password"       type="password"/>
  </div>
  <div class="row">
    <button class="g" onclick="doSignup()">signUp()</button>
    <button class="g" onclick="doSignin()">signIn()</button>
    <button class="b" onclick="doGetSession()">getSession()</button>
    <button class="b" onclick="doGetUser()">getUser()</button>
    <button class="r" onclick="doSignout()">signOut()</button>
  </div>
</div>

<!-- ENTITY -->
<div class="section">
  <h2>🏛️ ENTITY</h2>
  <div class="row">
    <button class="b" onclick="doGetEntity()">getEntity(moi)</button>
    <button class="g" onclick="doCreateEntity()">createEntity()</button>
    <button class="y" onclick="doGetWallet()">getWallet()</button>
    <button class="y" onclick="doCheckTables()">checkTables()</button>
  </div>
  <div class="row">
    <input id="searchUsername" placeholder="@username à chercher"/>
    <button class="b" onclick="doFindUsername()">findByUsername()</button>
  </div>
</div>

<!-- SOUFFLES -->
<div class="section">
  <h2>💨 SOUFFLES</h2>
  <div class="row">
    <input id="souffleContent" placeholder="Contenu test..." style="flex:3"/>
    <select id="souffleEmo" style="flex:none;width:100px">
      <option value="terre">🌿 Terre</option>
      <option value="feu">🔥 Feu</option>
      <option value="eau">💧 Eau</option>
      <option value="eclair">⚡ Éclair</option>
      <option value="brume">🌫️ Brume</option>
    </select>
  </div>
  <div class="row">
    <button class="b" onclick="doGetFeed()">getFeed()</button>
    <button class="g" onclick="doInsertSouffle()">INSERT souffle</button>
    <button class="r" onclick="doDeleteLast()">DELETE last</button>
    <button class="y" onclick="doCountToday()">countToday()</button>
  </div>
</div>

<!-- DIAGNOSIS -->
<div class="section">
  <div class="row">
    <button class="gold" style="flex:1;padding:12px;font-size:13px;letter-spacing:1px"
      onclick="doFullDiagnosis()">🔍 DIAGNOSTIC COMPLET</button>
    <button class="y" onclick="doCheckPolicies()">check RLS</button>
    <button class="y" onclick="doCheckFunctions()">check fonctions</button>
  </div>
</div>

<!-- LOG -->
<div class="log-actions">
  <button class="r" onclick="clearLog()">🗑 Clear</button>
  <button class="b" onclick="exportLog()">💾 Export</button>
</div>
<div id="log"></div>

<script>
  let sb   = null
  let lastSouffleId = null
  const logs = []

  // ── CONNECT ──
  function connectSupabase() {
    const url  = document.getElementById('cfgUrl').value.trim()
    const anon = document.getElementById('cfgAnon').value.trim()
    if (!url || !anon) { log('URL et clé ANON requis', 'er'); return }
    try {
      sb = supabase.createClient(url, anon, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
      })
      document.getElementById('connectStatus').innerHTML =
        '<span style="color:#81c784">✅ Connecté à ' + url + '</span>'
      log('Client Supabase créé : ' + url, 'ok')
      // Auto-check session
      sb.auth.getSession().then(({ data: { session } }) => {
        if (session) log('Session existante : ' + session.user.email, 'ok')
        else log('Pas de session active', 'wa')
      })
    } catch(e) {
      log('Erreur création client : ' + e.message, 'er')
    }
  }

  // ── LOGGER ──
  function log(msg, type = 'in', data = null) {
    const time = new Date().toLocaleTimeString('fr-FR')
    const entry = { time, msg, type, data }
    logs.push(entry)
    const el  = document.getElementById('log')
    const div = document.createElement('div')
    div.className = 'li ' + type
    div.textContent = '[' + time + '] ' + msg
    if (data) {
      const pre = document.createElement('div')
      pre.style.cssText = 'margin-left:20px;color:#888;font-size:11px;white-space:pre-wrap;word-break:break-all'
      pre.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2)
      div.appendChild(pre)
    }
    el.appendChild(div)
    el.scrollTop = el.scrollHeight
  }

  function clearLog() { document.getElementById('log').innerHTML = ''; logs.length = 0 }

  function exportLog() {
    const txt  = logs.map(l => '['+l.time+'] '+l.msg + (l.data ? '\n'+JSON.stringify(l.data,null,2) : '')).join('\n')
    const blob = new Blob([txt], {type:'text/plain'})
    const a    = document.createElement('a')
    a.href     = URL.createObjectURL(blob)
    a.download = 'aether-debug-' + Date.now() + '.txt'
    a.click()
  }

  function checkSb() {
    if (!sb) { log('Supabase non connecté — entre URL + clé ANON', 'er'); return false }
    return true
  }

  // ── AUTH ──
  async function doGetSession() {
    if (!checkSb()) return
    log('getSession()...', 'ts')
    const { data: { session }, error } = await sb.auth.getSession()
    if (error)   { log('Erreur : ' + error.message, 'er', error); return }
    if (!session){ log('Aucune session active', 'wa'); return }
    log('Session OK : ' + session.user.email, 'ok', {
      user_id:    session.user.id,
      email:      session.user.email,
      expires:    new Date(session.expires_at * 1000).toISOString(),
      confirmed:  !!session.user.confirmed_at,
    })
  }

  async function doGetUser() {
    if (!checkSb()) return
    log('getUser() — appel réseau...', 'ts')
    const { data, error } = await sb.auth.getUser()
    if (error)      { log('Erreur : ' + error.message, 'er', error); return }
    if (!data.user) { log('Aucun user', 'wa'); return }
    log('User trouvé : ' + data.user.email, 'ok', {
      id: data.user.id, email: data.user.email,
      confirmed: !!data.user.confirmed_at,
    })
  }

  async function doSignup() {
    if (!checkSb()) return
    const email    = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    if (!email || !password) { log('Email + password requis', 'er'); return }
    log('signUp(' + email + ')...', 'ts')
    const { data, error } = await sb.auth.signUp({ email, password })
    if (error) {
      log('ERREUR signUp : ' + error.message, 'er', { code: error.status, msg: error.message })
      return
    }
    if (data?.user?.identities?.length === 0) { log('Email déjà utilisé', 'wa'); return }
    log('Inscription OK : ' + data.user.id, 'ok', { id: data.user.id, email: data.user.email })
    setTimeout(async () => {
      log('Vérification entity créée...', 'in')
      const { data: ent, error: eErr } = await sb.from('entities').select('id,username').eq('id', data.user.id).single()
      if (eErr || !ent) log('Entity NON créée → trigger cassé ! ' + (eErr?.message || ''), 'er')
      else log('Entity créée par trigger : @' + ent.username, 'ok')
    }, 2000)
  }

  async function doSignin() {
    if (!checkSb()) return
    const email    = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    if (!email || !password) { log('Email + password requis', 'er'); return }
    log('signIn(' + email + ')...', 'ts')
    const { data, error } = await sb.auth.signInWithPassword({ email, password })
    if (error) { log('ERREUR signIn : ' + error.message, 'er', error); return }
    log('Connecté : ' + data.user.email, 'ok')
  }

  async function doSignout() {
    if (!checkSb()) return
    const { error } = await sb.auth.signOut()
    if (error) { log('Erreur : ' + error.message, 'er'); return }
    log('Déconnecté', 'ok')
  }

  // ── ENTITY ──
  async function doGetEntity() {
    if (!checkSb()) return
    log('getEntity(moi)...', 'ts')
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { log('Pas de session — connecte-toi', 'wa'); return }
    const { data, error } = await sb.from('entities').select('*').eq('id', session.user.id).single()
    if (error) { log('Entity non trouvée : ' + error.message, 'er', { code: error.code, hint: error.hint }); return }
    log('Entity OK : @' + data.username + ' | karma:' + data.karma_score, 'ok', data)
  }

  async function doFindUsername() {
    if (!checkSb()) return
    const u = document.getElementById('searchUsername').value.trim().replace('@','')
    if (!u) { log('Username requis', 'er'); return }
    log('findByUsername(@' + u + ')...', 'ts')
    const { data, error } = await sb.from('entities').select('*').eq('username', u).single()
    if (error) { log('Non trouvé : ' + error.message, 'er'); return }
    log('Trouvé : @' + data.username, 'ok', data)
  }

  async function doCreateEntity() {
    if (!checkSb()) return
    log('Création entity manuelle...', 'ts')
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { log('Pas de session', 'wa'); return }
    const base     = session.user.email.split('@')[0].toLowerCase().replace(/[^a-z0-9_]/g,'_')
    const username = base + '_' + Math.floor(Math.random()*9000+1000)
    const { data, error } = await sb.from('entities').insert({
      id: session.user.id, username,
      display_name: base, aura_color: 'terre',
      wisdom_level: 1, karma_score: 0,
      onboarding_completed: false,
    }).select().single()
    if (error) {
      log('Création échouée : ' + error.message, 'er', { code: error.code, hint: error.hint, details: error.details })
      if (error.code === '23505') log('→ Entity existe déjà (conflit unique)', 'wa')
      if (error.code === '42501') log('→ RLS bloque INSERT — policy manquante', 'er')
      return
    }
    log('Entity créée : @' + data.username, 'ok', data)
  }

  async function doGetWallet() {
    if (!checkSb()) return
    log('getWallet()...', 'ts')
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { log('Pas de session', 'wa'); return }
    const { data, error } = await sb.from('wallets').select('*').eq('entity_id', session.user.id).single()
    if (error) { log('Wallet non trouvé : ' + error.message, 'er'); return }
    log('Wallet : ' + data.balance + ' FCFA', 'ok', data)
  }

  async function doCheckTables() {
    if (!checkSb()) return
    log('Vérification tables...', 'ts')
    const tables = ['entities','souffles','resonances','echos','soul_links',
                    'wallets','offrandes','retraits','notifications','reports',
                    'conciles','concile_members']
    for (const t of tables) {
      try {
        const { count, error } = await sb.from(t).select('*', { count:'exact', head:true })
        if (error) log(t + ' : ' + error.message, 'er')
        else log(t + ' : ' + count + ' lignes', 'ok')
      } catch(e) { log(t + ' : exception', 'er') }
    }
  }

  // ── SOUFFLES ──
  async function doGetFeed() {
    if (!checkSb()) return
    log('getFeed()...', 'ts')
    const { data, error } = await sb
      .from('souffles')
      .select('id,content,emotion,entity_id,created_at')
      .eq('is_veiled', false)
      .order('created_at', { ascending: false })
      .limit(5)
    if (error) { log('Erreur : ' + error.message, 'er', { code: error.code }); return }
    log(data.length + ' souffle(s) dans le feed', 'ok',
      data.map(s => ({ id: s.id.slice(0,8), content: (s.content||'').slice(0,40), emotion: s.emotion })))
  }

  async function doInsertSouffle() {
    if (!checkSb()) return
    const content = document.getElementById('souffleContent').value.trim()
    const emotion = document.getElementById('souffleEmo').value
    if (!content) { log('Contenu requis', 'er'); return }
    log('INSERT souffle "' + content.slice(0,30) + '"...', 'ts')
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { log('Pas de session — INSERT impossible', 'er'); return }
    log('entity_id utilisé : ' + session.user.id, 'in')
    const payload = {
      entity_id: session.user.id,
      content, emotion,
      type: 'simple',
      karma_score: 10,
      is_veiled: true,
      is_ascending: false,
    }
    log('Payload envoyé', 'da', payload)
    const { data, error } = await sb.from('souffles').insert(payload).select().single()
    if (error) {
      log('INSERT ÉCHOUÉ : ' + error.message, 'er', { code: error.code, hint: error.hint, details: error.details })
      if (error.code === '42501') log('→ RLS bloque : policy INSERT manquante ou auth.uid() null', 'er')
      if (error.code === '23503') log('→ entity_id absent dans entities', 'er')
      if (error.code === '23502') log('→ Colonne NOT NULL manquante', 'er')
      return
    }
    log('INSERT OK : ' + data.id, 'ok', data)
    lastSouffleId = data.id
  }

  async function doDeleteLast() {
    if (!checkSb()) return
    if (!lastSouffleId) { log('Aucun souffle test à supprimer', 'wa'); return }
    log('DELETE ' + lastSouffleId + '...', 'ts')
    const { error } = await sb.from('souffles').delete().eq('id', lastSouffleId)
    if (error) { log('Erreur : ' + error.message, 'er'); return }
    log('Souffle supprimé', 'ok')
    lastSouffleId = null
  }

  async function doCountToday() {
    if (!checkSb()) return
    log('countSoufflesToday()...', 'ts')
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { log('Pas de session', 'wa'); return }
    const debut = new Date(); debut.setHours(0,0,0,0)
    const { count, error } = await sb.from('souffles')
      .select('id', { count:'exact', head:true })
      .eq('entity_id', session.user.id)
      .gte('created_at', debut.toISOString())
    if (error) { log('Erreur : ' + error.message, 'er'); return }
    log((count||0) + ' souffles aujourd\'hui (limite: 7)', count >= 7 ? 'wa' : 'ok')
  }

  // ── RLS & FUNCTIONS ──
  async function doCheckPolicies() {
    if (!checkSb()) return
    log('Vérification RLS...', 'ts')
    const { data: { session } } = await sb.auth.getSession()
    const tables = ['entities','souffles','wallets','echos','notifications']
    for (const t of tables) {
      const { data, error } = await sb.from(t).select('id').limit(1)
      if (error) log(t + ' SELECT : bloqué — ' + error.message, 'er')
      else log(t + ' SELECT : OK', 'ok')
    }
    if (!session) log('auth.uid() = null → INSERT bloqué sur toutes les tables', 'wa')
    else log('auth.uid() disponible : ' + session.user.id, 'ok')
  }

  async function doCheckFunctions() {
    if (!checkSb()) return
    log('Vérification fonctions SQL...', 'ts')
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { log('Pas de session pour tester les fonctions', 'wa'); return }
    const { error } = await sb.rpc('increment_karma', { uid: session.user.id, delta: 0 })
    if (error) log('increment_karma : ERREUR — ' + error.message, 'er', error)
    else log('increment_karma : OK', 'ok')
  }

  // ── FULL DIAGNOSIS ──
  async function doFullDiagnosis() {
    clearLog()
    if (!checkSb()) return
    log('══ DIAGNOSTIC COMPLET AETHER ══', 'ts')

    // 1. Session
    log('1/6 — Session...', 'ts')
    const { data: { session } } = await sb.auth.getSession()
    if (!session) {
      log('Pas de session active', 'er')
      log('→ Entre tes identifiants et clique signIn()', 'wa')
    } else {
      log('Session OK : ' + session.user.email + ' | id: ' + session.user.id, 'ok')
    }

    // 2. Entity
    log('2/6 — Entity...', 'ts')
    if (session) {
      const { data: ent, error: eErr } = await sb
        .from('entities').select('*').eq('id', session.user.id).single()
      if (eErr || !ent) {
        log('Entity MANQUANTE : ' + (eErr?.message||''), 'er')
        log('→ Trigger handle_new_user cassé', 'wa')
        log('→ Exécuter le SQL de correction', 'wa')
      } else {
        log('Entity OK : @' + ent.username + ' | karma:' + ent.karma_score, 'ok', {
          username: ent.username, display_name: ent.display_name,
          karma_score: ent.karma_score, onboarding: ent.onboarding_completed,
        })
      }
    }

    // 3. Wallet
    log('3/6 — Wallet...', 'ts')
    if (session) {
      const { data: w, error: wErr } = await sb
        .from('wallets').select('*').eq('entity_id', session.user.id).single()
      if (wErr || !w) log('Wallet MANQUANT : ' + (wErr?.message||''), 'wa')
      else log('Wallet OK : ' + w.balance + ' FCFA', 'ok')
    }

    // 4. Tables
    log('4/6 — Tables...', 'ts')
    const required = ['entities','souffles','resonances','echos',
                      'soul_links','wallets','notifications']
    for (const t of required) {
      const { count, error } = await sb.from(t).select('*', { count:'exact', head:true })
      if (error) log(t + ' : MANQUANTE — ' + error.message, 'er')
      else log(t + ' : ' + count + ' lignes', 'ok')
    }

    // 5. INSERT test
    log('5/6 — Test INSERT souffle...', 'ts')
    if (session) {
      const { data: ts, error: tsErr } = await sb
        .from('souffles')
        .insert({
          entity_id: session.user.id,
          content: '[DEBUG TEST] Souffle diagnostic',
          emotion: 'terre', type: 'simple',
          karma_score: 0, is_veiled: true, is_ascending: false,
        })
        .select().single()

      if (tsErr) {
        log('INSERT ÉCHOUÉ : ' + tsErr.message, 'er', { code: tsErr.code, hint: tsErr.hint })
        if (tsErr.code === '42501') log('→ RLS bloque INSERT souffles — policy manquante', 'er')
        if (tsErr.message?.includes('auth.uid()')) log('→ auth.uid() null — session non transmise', 'er')
        if (tsErr.code === '23503') log('→ entity_id absent dans entities', 'er')
        if (tsErr.code === '23502') log('→ Colonne required manquante dans le payload', 'er')
      } else {
        log('INSERT OK : ' + ts.id, 'ok')
        await sb.from('souffles').delete().eq('id', ts.id)
        log('Souffle test nettoyé', 'in')
      }
    }

    // 6. Fonctions
    log('6/6 — Fonctions SQL...', 'ts')
    if (session) {
      const { error: kErr } = await sb.rpc('increment_karma', { uid: session.user.id, delta: 0 })
      if (kErr) log('increment_karma : ERREUR — ' + kErr.message, 'er')
      else log('increment_karma : OK', 'ok')
    }

    log('══ FIN DU DIAGNOSTIC ══', 'ts')
  }
</script>
</body>
</html>
